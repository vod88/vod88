<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="never">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <link rel="manifest" href="manifest.json">
    <title>私人影院 - 懒加载极速版</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js/dist/hls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>
    <style>
        :root { --primary: #007bff; --bg: #0a0a0a; --card: #161616; --accent: #ff9800; --watched: #444; }
        body { font-family: system-ui, sans-serif; margin: 0; background: var(--bg); color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #player-box { width: 100%; background: #000; flex-shrink: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,1); }
        #dplayer { width: 100%; aspect-ratio: 16/9; }
        .top-bar { padding: 12px 15px; background: #111; border-bottom: 1px solid #222; flex-shrink: 0; }
        .stats-info { font-size: 12px; color: var(--accent); margin-bottom: 8px; display: flex; justify-content: space-between; }
        
        .search-box { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; outline: none; }
        .notice-bar { background: #1a1a1a; color: var(--accent); padding: 5px 0; font-size: 12px; border-bottom: 1px solid #222; flex-shrink: 0; }
        #content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; scroll-behavior: smooth; }
        
        .drama-card { background: var(--card); border-radius: 12px; margin-bottom: 25px; border: 1px solid #262626; overflow: hidden; display: flex; flex-direction: column; }
        .drama-poster { width: 100%; height: 160px; object-fit: cover; background: #222; border-bottom: 1px solid #222; }
        .drama-info { padding: 15px; }
        .drama-title { font-size: 1.1rem; color: var(--accent); margin-bottom: 12px; font-weight: bold; }
        .drama-num { background: var(--accent); color: #000; padding: 2px 6px; border-radius: 4px; margin-right: 8px; font-size: 0.8rem; }
        
        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 8px; }
        .ep-btn { padding: 8px 2px; background: #262626; border-radius: 6px; text-align: center; cursor: pointer; font-size: 12px; border: 1px solid #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ep-btn.active { background: var(--primary); border-color: #55aaff; font-weight: bold; }
        .ep-btn.watched { color: #888; border-style: dashed; }
        .ep-btn.last-played { border-color: var(--accent); position: relative; }
        .ep-btn.last-played::after { content: '上次看到这'; position: absolute; top: 0; right: 0; font-size: 8px; background: var(--accent); color: #000; padding: 0 2px; border-radius: 0 0 0 4px; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; padding: 20px 0; margin-top: 10px; border-top: 1px dashed #333; }
        .page-link { padding: 8px 15px; background: #222; border: 1px solid #444; border-radius: 6px; cursor: pointer; color: #ccc; font-size: 14px; user-select: none; }
        .page-link.disabled { opacity: 0.3; cursor: not-allowed; }
        #page-num { font-size: 14px; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div id="player-box"><div id="dplayer"><div class="player-placeholder">等待选择影片...</div></div></div>
<div class="top-bar">
    <div class="stats-info">
        <span onclick="checkAdmin()">片库：<b id="total-movies">0</b> 部</span>
        <span id="history-tip" style="color: #666; cursor:pointer">清除播放记录</span>
    </div>
    <input type="text" class="search-box" id="search" placeholder="🔍 输入关键词搜索...">
    
</div>
<div class="notice-bar">
    <marquee scrollamount="5">📢 站点已同步至 GitHub & Cloudflare 全球加速 | 极客版分页功能已上线 | 资源请求请联系管理员 | 祝您观影愉快！</marquee>
</div>

<div id="content">
    <div id="main-list"></div>
    <div class="pagination" id="pagination-ctrl">
        <div class="page-link" id="prev-btn">上一页</div>
        <div id="page-num">第 1 页</div>
        <div class="page-link" id="next-btn">下一页</div>
    </div>
</div>

<script>
let dp = null, currentBtn = null, debounceTimer = null;
let currentPage = 1, itemsPerPage = 10;
let videoGroups = [], allData = [];
let dataLoaded = false;
let clickCount = 0;

function checkAdmin() {
    clickCount++;
    if (clickCount >= 5) {
        const adminUrl = prompt("输入管理后台地址:");
        if (adminUrl) window.location.href = adminUrl;
    }
    setTimeout(() => { clickCount = 0; }, 3000);
}

// ========== 懒加载：页面加载完才异步拉取 data.js ==========
function lazyLoadData() {
    if (dataLoaded) return;
    const script = document.createElement('script');
    script.src = 'data.js';
    script.onload = function() {
        parseAllData();
        dataLoaded = true;
        render();
    };
    document.body.appendChild(script);
}

// ========== 解析数据（只执行一次） ==========
function parseAllData() {
    if (typeof videoData === 'undefined') return;
    const lines = videoData.trim().split('\n');
    let current = null;
    allData = [];
    let movieCount = 0;

    lines.forEach(line => {
        const parts = line.split(',');
        const name = parts[0], url = parts[1], poster = parts[2];
        if (!url) return;
        if (url.trim() === '#genre#') {
            movieCount++;
            if (current) allData.push(current);
            current = { index: movieCount, title: name, poster: poster || '', items: [] };
        } else if (current) {
            current.items.push({ 
                name: name.replace(current.title, '').trim() || "正片", 
                url: url.trim() 
            });
        }
    });
    if (current) allData.push(current);
    document.getElementById('total-movies').innerText = allData.length;
}

// ========== 播放、历史、本地存储 ==========
function saveHistory(url, title) {
    localStorage.setItem('last_played_url', url);
    localStorage.setItem('last_played_title', title);
    let watched = JSON.parse(localStorage.getItem('watched_list') || '[]');
    if (!watched.includes(url)) { 
        watched.push(url); 
        localStorage.setItem('watched_list', JSON.stringify(watched)); 
    }
}

function initPlayer() {
    dp = new DPlayer({ 
        container: document.getElementById('dplayer'), 
        autoplay: false, 
        video: { url: '', type: 'hls' } 
    });
    dp.on('ended', () => { 
        if (currentBtn) { 
            const next = currentBtn.nextElementSibling; 
            if (next) next.click(); 
        } 
    });
}

function playVideo(url, btn, title) {
    currentBtn = btn;
    document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active', 'last-played'));
    btn.classList.add('active', 'last-played', 'watched');
    saveHistory(url, title);
    if (!dp) initPlayer();
    dp.switchVideo({ url: url, type: 'hls' });
    dp.play();
    document.getElementById('player-box').scrollIntoView({ behavior: 'smooth' });
}

// ========== 搜索防抖 ==========
document.getElementById('search').addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => { 
        currentPage = 1; 
        render(); 
    }, 300);
});

// ========== 分页 ==========
document.getElementById('prev-btn').onclick = () => {
    if (currentPage > 1) {
        currentPage--;
        render();
        document.getElementById('content').scrollTop = 0;
    }
};

document.getElementById('next-btn').onclick = () => {
    const kw = document.getElementById('search').value.toLowerCase();
    const filtered = allData.filter(g => !kw || g.title.toLowerCase().includes(kw));
    if (currentPage * itemsPerPage < filtered.length) {
        currentPage++;
        render();
        document.getElementById('content').scrollTop = 0;
    }
};

// ========== 渲染列表 ==========
function render() {
    if (!dataLoaded) return;
    const kw = document.getElementById('search').value.toLowerCase();
    const list = document.getElementById('main-list');
    list.innerHTML = '';

    const filteredData = allData.filter(g => !kw || g.title.toLowerCase().includes(kw));
    const totalPages = Math.ceil(filteredData.length / itemsPerPage) || 1;
    const pageData = filteredData.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

    document.getElementById('page-num').innerText = `第 ${currentPage} / ${totalPages} 页`;
    document.getElementById('prev-btn').classList.toggle('disabled', currentPage === 1);
    document.getElementById('next-btn').classList.toggle('disabled', currentPage >= totalPages);

    const lastUrl = localStorage.getItem('last_played_url');
    const watchedList = JSON.parse(localStorage.getItem('watched_list') || '[]');

    pageData.forEach(g => {
        const card = document.createElement('div');
        card.className = 'drama-card';
        card.innerHTML = `
            ${g.poster ? `<img src="${g.poster}" class="drama-poster" loading="lazy">` : ''}
            <div class="drama-info">
                <div class="drama-title"><span class="drama-num">${g.index}</span>${g.title}</div>
                <div class="ep-grid"></div>
            </div>`;
        list.appendChild(card);

        const grid = card.querySelector('.ep-grid');
        g.items.forEach((item, i) => {
            const btn = document.createElement('div');
            btn.className = 'ep-btn';
            if (item.url === lastUrl) btn.classList.add('last-played', 'active');
            if (watchedList.includes(item.url)) btn.classList.add('watched');
            btn.innerText = (i + 1) + ". " + item.name;
            btn.onclick = () => playVideo(item.url, btn, g.title);
            grid.appendChild(btn);
        });
    });
}

// 清除记录
document.getElementById('history-tip').onclick = () => {
    if (confirm('确定清除所有播放记录？')) {
        localStorage.clear();
        location.reload();
    }
};

// ========== 入口：懒加载启动 ==========
window.addEventListener('DOMContentLoaded', () => {
    lazyLoadData(); // 首屏渲染完才加载数据
    initPlayer();
});
</script>
</body>
</html>
